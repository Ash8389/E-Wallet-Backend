server:
  port: 8080

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/users/**
              filters:
                - StripPrefix=1

            - id: wallet-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/wallet/**
              filters:
                - StripPrefix=1
#
            - id: transaction-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/transactions/**
              filters:
                - StripPrefix=1