
services:
  # ─────────────────────────────────────────
  # INFRASTRUCTURE
  # ─────────────────────────────────────────

  mysql:
    image: mysql:8.0
    container_name: ewallet-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_USER: ewallet
      MYSQL_PASSWORD: ewallet1234
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-proot1234",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ewallet-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ewallet-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ewallet-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test:
        [
          "CMD",
          "kafka-topics",
          "--bootstrap-server",
          "localhost:9092",
          "--list",
        ]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────
  # MICROSERVICES
  # ─────────────────────────────────────────

  user-service:
    build:
      context: .
      dockerfile: userservice/Dockerfile
    container_name: ewallet-user-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/userdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ewallet
      SPRING_DATASOURCE_PASSWORD: ewallet1234
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  wallet-service:
    build:
      context: .
      dockerfile: walletservice/Dockerfile
    container_name: ewallet-wallet-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/walletdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ewallet
      SPRING_DATASOURCE_PASSWORD: ewallet1234
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  transaction-service:
    build:
      context: .
      dockerfile: transactionservice/Dockerfile
    container_name: ewallet-transaction-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/transactiondb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ewallet
      SPRING_DATASOURCE_PASSWORD: ewallet1234
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      WALLET_SERVICE_URL: http://wallet-service:8082
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      wallet-service:
        condition: service_started

  # notification-service:
  #   build:
  #     context: ./notificationservice
  #     dockerfile: Dockerfile
  #   container_name: ewallet-notification-service
  #   restart: unless-stopped
  #   ports:
  #     - "8084:8084"
  #   environment:
  #     SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  #   depends_on:
  #     kafka:
  #       condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: API-Gateway/Dockerfile
    container_name: ewallet-api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      USER_SERVICE_URL: http://user-service:8081
      WALLET_SERVICE_URL: http://wallet-service:8082
      TRANSACTION_SERVICE_URL: http://transaction-service:8083
    depends_on:
      - user-service
      - wallet-service
      - transaction-service

volumes:
  mysql-data:
